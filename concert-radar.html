<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Concert Radar" />
<meta name="theme-color" content="#080808" />
<title>Concert Radar — Philadelphia</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.20.0/lib/msal-browser.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #252525;
  --border2: #333;
  --accent: #c8ff00;
  --accent2: #ff5c35;
  --text: #efefef;
  --muted: #777;
  --muted2: #555;
  --radius: 10px;
  --fd: 'DM Serif Display', Georgia, serif;
  --fm: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fm);
  min-height: 100vh;
  font-size: 14px;
}

/* ─── Header ─────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(12px);
  z-index: 20;
}

.logo {
  font-family: var(--fd);
  font-size: 1.5rem;
  letter-spacing: -0.02em;
  line-height: 1;
}
.logo em { color: var(--accent); font-style: normal; }
.logo-sub {
  font-family: var(--fm);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 3px;
}

.header-right { display: flex; gap: 0.6rem; align-items: center; }

.show-pill {
  font-size: 0.7rem;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 0.3rem 0.75rem;
}
.show-pill span { color: var(--accent); font-weight: 500; }

button {
  font-family: var(--fm);
  cursor: pointer;
  border: none;
  background: none;
}

.btn-refresh {
  font-size: 0.72rem;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 0.3rem 0.8rem;
  transition: color 0.15s, border-color 0.15s;
}
.btn-refresh:hover { color: var(--text); border-color: #555; }

.btn-outlook {
  font-size: 0.72rem;
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 0.3rem 0.9rem;
  transition: all 0.2s;
}
.btn-outlook:hover { border-color: var(--accent); color: var(--accent); }
.btn-outlook.connected { border-color: var(--accent); color: var(--accent); }

/* ─── Tabs ───────────────────────────────────── */
nav.tabs {
  display: flex;
  padding: 0 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.tab {
  font-size: 0.75rem;
  color: var(--muted);
  padding: 0.85rem 1rem;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: 0.04em;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ─── Main ───────────────────────────────────── */
main { padding: 2rem; max-width: 1280px; margin: 0 auto; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── Filters ────────────────────────────────── */
.filters {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  align-items: center;
}
.filter-label { font-size: 0.7rem; color: var(--muted); margin-right: 0.25rem; }
.filter-btn {
  font-size: 0.7rem;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 0.28rem 0.7rem;
  transition: all 0.15s;
  font-family: var(--fm);
  cursor: pointer;
  background: none;
}
.filter-btn:hover { color: var(--text); border-color: #555; }
.filter-btn.active { color: var(--accent); border-color: var(--accent); }

/* ─── Calendar ────────────────────────────────── */
.cal-header {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.cal-nav {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text);
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 1.1rem;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.cal-nav:hover { border-color: var(--accent); color: var(--accent); }
.cal-title {
  font-family: var(--fd, var(--fm));
  font-size: 1.4rem;
  font-weight: 500;
  min-width: 200px;
}
.cal-legend {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  font-size: 0.7rem;
  color: var(--muted);
}
.cal-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 0.35rem;
  vertical-align: middle;
}
.cal-dot.music  { background: var(--accent); }
.cal-dot.sports { background: var(--accent2); }

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
  padding: 0 2px;
}
.cal-weekdays span { padding: 0.3rem 0.4rem; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 1.5rem;
}
.cal-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.45rem 0.5rem;
  min-height: 80px;
  text-align: left;
  cursor: default;
  display: flex;
  flex-direction: column;
  gap: 3px;
  transition: border-color 0.15s, background 0.15s;
  font-family: var(--fm);
}
.cal-day.other-month { opacity: 0.35; }
.cal-day.has-events  { cursor: pointer; }
.cal-day.has-events:hover { border-color: var(--accent); }
.cal-day.today .cal-day-num { color: var(--accent); font-weight: 600; }
.cal-day.selected { border-color: var(--accent); background: rgba(200,255,0,0.05); }
.cal-day-num {
  font-size: 0.72rem;
  color: var(--muted);
}
.cal-day-events {
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow: hidden;
}
.cal-evt {
  font-size: 0.62rem;
  color: var(--text);
  padding: 2px 5px;
  border-radius: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid var(--accent);
  background: rgba(200,255,0,0.07);
}
.cal-evt.sports {
  border-left-color: var(--accent2);
  background: rgba(255,92,53,0.07);
}
.cal-evt-more {
  font-size: 0.6rem;
  color: var(--muted);
  padding: 0 5px;
}

.cal-day-detail {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.2rem;
  margin-top: 0.5rem;
}
.cal-day-detail h3 {
  margin: 0 0 0.8rem;
  font-family: var(--fd, var(--fm));
  font-size: 1.1rem;
}
.cal-day-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.8rem;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.cal-day-item:last-child { border-bottom: none; }
.cal-day-item:hover .cal-day-item-title { color: var(--accent); }
.cal-day-item-title {
  font-size: 0.85rem;
  transition: color 0.15s;
}
.cal-day-item-meta {
  font-size: 0.7rem;
  color: var(--muted);
  white-space: nowrap;
}
.cal-day-item-tag {
  font-size: 0.6rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: 0.4rem;
}
.cal-day-item-tag.sports { color: var(--accent2); }

html, body { overflow-x: hidden; max-width: 100vw; }
*, *::before, *::after { -webkit-tap-highlight-color: transparent; }

@media (max-width: 640px) {
  header {
    padding: 0.7rem 0.9rem;
    flex-wrap: nowrap;
    gap: 0.4rem;
  }
  .logo { font-size: 1.05rem; }
  .logo-sub { display: none; }
  .header-right { gap: 0.35rem; flex-wrap: nowrap; }
  .show-pill { font-size: 0.6rem; padding: 0.22rem 0.5rem; white-space: nowrap; }
  .show-pill .snapshot-age { display: none; }
  .btn-refresh, .btn-outlook { font-size: 0.62rem; padding: 0.22rem 0.55rem; white-space: nowrap; }

  nav.tabs {
    padding: 0 0.9rem;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  .tab { white-space: nowrap; padding: 0.7rem 0.8rem; font-size: 0.72rem; }

  main { padding: 0.9rem; }
  .filters { gap: 0.3rem; margin-bottom: 0.8rem; }
  .filter-btn { padding: 0.28rem 0.6rem; font-size: 0.66rem; }
  .filter-label { font-size: 0.62rem; }

  .concert-grid {
    grid-template-columns: 1fr;
    gap: 0.7rem;
  }
  .concert-card { display: flex; flex-direction: row; }
  .card-img {
    width: 110px;
    min-width: 110px;
    height: auto;
    aspect-ratio: 1 / 1;
    flex-shrink: 0;
  }
  .card-img-fallback { font-size: 2rem; }
  .card-body {
    padding: 0.7rem 0.8rem;
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .card-artist { font-size: 0.9rem; margin-bottom: 0.15rem; }
  .card-venue { font-size: 0.7rem; margin-bottom: 0.45rem; }
  .card-meta { font-size: 0.62rem; margin-bottom: 0.55rem; }
  .card-actions { gap: 0.3rem; margin-top: auto; }
  .btn-listen, .btn-save { padding: 0.38rem 0.5rem; font-size: 0.66rem; }

  .artist-drawer {
    width: 100vw !important;
    left: 0 !important;
    right: auto !important;
    padding: 1rem;
    overflow-x: hidden;
  }
  .drawer-meta, .drawer-meta span { word-break: break-word; }
  .drawer-artist-name { font-size: 1.4rem; padding-right: 2.5rem; }
  .drawer-close { top: 0.75rem; right: 0.75rem; z-index: 5; }
  .listen-links { gap: 0.3rem; }
  .listen-links a { font-size: 0.65rem; padding: 0.45rem 0.4rem; }

  .cal-header { gap: 0.5rem; }
  .cal-title { font-size: 1.05rem; min-width: 120px; }
  .cal-legend { font-size: 0.62rem; gap: 0.5rem; width: 100%; margin-left: 0; }
  .cal-day { min-height: 56px; padding: 0.3rem; }
  .cal-day-num { font-size: 0.65rem; }
  .cal-evt { display: none; }
  .cal-evt-more { display: none; }
  .cal-evt-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin: 1px;
  }
  .cal-evt-dot.sports { background: var(--accent2); }

  .saved-row {
    flex-direction: column;
    align-items: stretch;
    gap: 0.6rem;
    padding: 0.75rem 0.85rem;
  }
  .saved-left { width: 100%; }
  .saved-name { font-size: 0.9rem; }
  .saved-venue { font-size: 0.7rem; white-space: normal; }
  .saved-right {
    width: 100%;
    flex-wrap: wrap;
    gap: 0.35rem;
    justify-content: flex-start;
  }
  .badge { font-size: 0.6rem; padding: 0.18rem 0.5rem; }
  .saved-ticket-link { font-size: 0.65rem; padding: 0.25rem 0.5rem; }
  .btn-unsave { margin-left: auto; font-size: 0.9rem; }
}

/* ─── Concert Grid ───────────────────────────── */
.concert-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
}

.loading {
  color: var(--muted);
  font-size: 0.8rem;
  padding: 4rem 0;
  text-align: center;
  grid-column: 1/-1;
}

.concert-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
  animation: fadeUp 0.4s ease both;
}
.concert-card:hover { border-color: var(--border2); transform: translateY(-2px); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-img {
  height: 130px;
  background: var(--surface2) center/cover no-repeat;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.7));
}
.card-img-fallback {
  font-family: var(--fd);
  font-size: 3.5rem;
  color: var(--border2);
  position: relative;
  z-index: 1;
}

.card-body { padding: 0.9rem; }
.card-artist { font-size: 0.88rem; font-weight: 500; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-venue { color: var(--muted); font-size: 0.72rem; margin-bottom: 0.6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 0.8rem;
}
.card-price { color: var(--accent); }

.card-actions { display: flex; gap: 0.45rem; }

.btn-listen {
  flex: 1;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 7px;
  padding: 0.42rem 0.6rem;
  font-family: var(--fm);
  font-size: 0.72rem;
  font-weight: 500;
  transition: opacity 0.15s;
}
.btn-listen:hover { opacity: 0.85; }

.btn-save {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  border-radius: 7px;
  padding: 0.42rem 0.6rem;
  font-family: var(--fm);
  font-size: 0.72rem;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-save:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-save.saved { border-color: var(--accent2); color: var(--accent2); }

/* ─── Drawer ─────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 40;
  opacity: 0;
  transition: opacity 0.3s;
}
.drawer-overlay.visible { opacity: 1; }

.artist-drawer {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: 440px;
  background: var(--surface);
  border-left: 1px solid var(--border2);
  z-index: 50;
  padding: 1.5rem;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.artist-drawer.open { transform: translateX(0); }

.drawer-close {
  position: absolute; top: 1rem; right: 1rem;
  color: var(--muted); font-size: 1rem;
  width: 28px; height: 28px;
  border: 1px solid var(--border2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.15s, border-color 0.15s;
}
.drawer-close:hover { color: var(--text); border-color: #555; }

.drawer-eyebrow {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.drawer-artist-name {
  font-family: var(--fd);
  font-size: 1.9rem;
  line-height: 1.1;
  margin-bottom: 0.35rem;
}
.drawer-meta {
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.drawer-meta a {
  color: var(--accent);
  text-decoration: none;
}
.drawer-meta a:hover { text-decoration: underline; }

.drawer-section-label {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 0.6rem;
}

.sc-player-wrap {
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 1.5rem;
  border: 1px solid var(--border);
}
.sc-player-wrap iframe { display: block; }

.sc-fallback {
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 1.5rem;
  text-align: center;
}
.sc-fallback a { color: var(--accent); text-decoration: none; }

.listen-links {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 1.25rem;
}
.listen-links a {
  flex: 1;
  text-align: center;
  padding: 0.5rem 0.6rem;
  border: 1px solid var(--border2);
  border-radius: 20px;
  font-size: 0.7rem;
  font-family: var(--fm);
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s;
}
.listen-links a:hover { color: var(--text); }
.listen-links a.yt:hover { border-color: #ff3b3b; color: #ff5555; }
.listen-links a.sc:hover { border-color: #ff5500; color: #ff7733; }
.listen-links a.sp:hover { border-color: #1db954; color: #1ed760; }

.server-hint {
  display: none;
  background: rgba(200,255,0,0.08);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 0.8rem 0.9rem;
  margin-bottom: 1.25rem;
  font-size: 0.72rem;
  color: var(--text);
  line-height: 1.5;
}
.server-hint strong { color: var(--accent); }
.server-hint code {
  display: block;
  background: rgba(0,0,0,0.45);
  padding: 0.45rem 0.6rem;
  border-radius: 5px;
  margin: 0.5rem 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  color: var(--accent);
  font-size: 0.68rem;
  user-select: all;
}
html.is-file .server-hint { display: block; }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.25rem 0;
}

.reminder-toggles {
  display: flex;
  gap: 0.45rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.reminder-btn {
  font-size: 0.7rem;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 0.3rem 0.8rem;
  font-family: var(--fm);
  transition: all 0.15s;
  background: none;
}
.reminder-btn:hover, .reminder-btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

.btn-add-cal {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 0.75rem;
  font-family: var(--fm);
  font-size: 0.8rem;
  font-weight: 500;
  transition: opacity 0.15s;
  margin-bottom: 0.5rem;
}
.btn-add-cal:hover:not(:disabled) { opacity: 0.85; }
.btn-add-cal:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-add-cal.synced {
  background: none;
  border: 1px solid var(--accent);
  color: var(--accent);
}

.btn-tickets-link {
  display: block;
  width: 100%;
  text-align: center;
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 0.65rem;
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.15s;
  font-family: var(--fm);
}
.btn-tickets-link:hover { border-color: #555; color: var(--text); }

/* ─── Saved Tab ──────────────────────────────── */
.saved-empty {
  color: var(--muted);
  font-size: 0.8rem;
  padding: 4rem 0;
  text-align: center;
}

.saved-list { display: flex; flex-direction: column; gap: 0.6rem; }

.saved-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1.1rem;
  gap: 1rem;
  transition: border-color 0.15s;
}
.saved-row:hover { border-color: var(--border2); }

.saved-left { flex: 1; min-width: 0; }
.saved-name { font-size: 0.88rem; font-weight: 500; margin-bottom: 0.2rem; }
.saved-venue { font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.saved-right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-shrink: 0;
}

.badge {
  font-size: 0.65rem;
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 0.2rem 0.55rem;
  color: var(--muted);
  white-space: nowrap;
}
.badge.synced { border-color: var(--accent); color: var(--accent); }
.badge.soon { border-color: var(--accent2); color: var(--accent2); }
.badge.urgent { border-color: #ff3333; color: #ff5555; }

.saved-ticket-link {
  font-size: 0.7rem;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 0.3rem 0.6rem;
  transition: all 0.15s;
  white-space: nowrap;
}
.saved-ticket-link:hover { color: var(--text); border-color: #555; }

.btn-unsave {
  color: var(--muted2);
  font-size: 0.8rem;
  padding: 0.2rem 0.4rem;
  transition: color 0.15s;
}
.btn-unsave:hover { color: #ff4444; }

/* ─── Hidden ─────────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Tabs -->

<!-- Content -->
<main>
  <section id="tab-feed" class="tab-panel active">
    <div class="filters" data-filter-kind="sort">
      <span class="filter-label">Sort:</span>
      <button class="filter-btn active" data-sort="date">By date</button>
      <button class="filter-btn" data-sort="price">By price</button>
      <button class="filter-btn" data-sort="saved">Saved first</button>
    </div>
    <div class="filters" data-filter-kind="genre" id="concert-genre-filters">

      <button class="filter-btn active" data-genre="all">All</button>
    </div>
    <div id="concert-grid" class="concert-grid">
      <div class="loading">Loading Philadelphia shows…</div>
    </div>
  </section>

  <section id="tab-sports" class="tab-panel hidden">
    <div class="filters" data-filter-kind="league" id="sports-league-filters">
      <span class="filter-label">League:</span>
      <button class="filter-btn active" data-league="all">All</button>
    </div>
    <div id="sports-grid" class="concert-grid">
      <div class="loading">Loading Philadelphia sports…</div>
    </div>
  </section>

  <section id="tab-calendar" class="tab-panel hidden">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">‹</button>
      <div class="cal-title" id="cal-title">—</div>
      <button class="cal-nav" id="cal-next">›</button>
      <div class="cal-legend">
        <span class="cal-dot music"></span> Music
        <span class="cal-dot sports"></span> Sports
      </div>
    </div>
    <div class="cal-weekdays">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
    <div id="cal-day-detail" class="cal-day-detail hidden"></div>
  </section>

  <section id="tab-saved" class="tab-panel hidden">
    <div id="saved-list-container"></div>
  </section>
</main>

<!-- Overlay -->
<div id="drawer-overlay" class="drawer-overlay hidden"></div>

<!-- Artist Drawer -->
<aside id="artist-drawer" class="artist-drawer">
  <button class="drawer-close" id="btn-close-drawer">✕</button>
  <div id="drawer-content"></div>
</aside>

<script>
// ── CONFIG ────────────────────────────────────────────
// Fill these in before opening the file
const CONFIG = {
  ticketmasterApiKey: 'N3MI6yDJM4Gn6clJtZxGxYG81fBCKsIB',        // ← developer.ticketmaster.com → My Apps
  msalClientId:       '82477276-07f8-4ae9-85c0-7ebec2ac5e2b',    // ← your Azure app client ID
  msalTenantId:       'common',
};

// ── STATE ─────────────────────────────────────────────
let allEvents = [];
let allSportsEvents = [];
let sportsLoaded = false;
let currentSort = 'date';
let currentGenre = 'all';
let currentLeague = 'all';
let outlookConnected = false;
let selectedReminderDays = 7;
const SAVED_KEY = 'concert-radar-v1';

// ── STORAGE ───────────────────────────────────────────
function getSaved() {
  try { return JSON.parse(localStorage.getItem(SAVED_KEY)) || {}; }
  catch { return {}; }
}
function isArtistSaved(name) { return !!getSaved()[name]; }

function saveArtist(event, reminderDays, synced = false) {
  const saved = getSaved();
  const artist = event.performers[0];
  saved[artist.name] = {
    artistName: artist.name,
    venueName: event.venue.name,
    datetime: event.datetime_local,
    seatgeekUrl: event.url,
    reminderDays: reminderDays || 7,
    calendarSynced: synced,
    savedAt: new Date().toISOString(),
    image: artist.image || null,
  };
  localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
}

function unsaveArtist(name) {
  const saved = getSaved();
  delete saved[name];
  localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
}

// ── SNAPSHOT ──────────────────────────────────────────
let _snapshot = null;
let _snapshotTried = false;

async function loadSnapshot() {
  if (_snapshotTried) return _snapshot;
  _snapshotTried = true;
  try {
    const res = await fetch('events.json', { cache: 'no-store' });
    if (!res.ok) return null;
    _snapshot = await res.json();
    return _snapshot;
  } catch {
    return null;
  }
}

function showSnapshotAge() {
  if (!_snapshot?.generatedAt) return;
  const mins = Math.round((Date.now() - new Date(_snapshot.generatedAt)) / 60000);
  const label = mins < 60 ? `${mins}m ago`
              : mins < 1440 ? `${Math.round(mins/60)}h ago`
              : `${Math.round(mins/1440)}d ago`;
  const el = document.getElementById('show-count');
  if (el && !el.dataset.snapshotTagged) {
    el.insertAdjacentHTML('afterend', ` <span style="font-size:0.65rem;color:var(--muted);margin-left:0.4rem">· cached ${label}</span>`);
    el.dataset.snapshotTagged = '1';
  }
}

// ── TICKETMASTER ──────────────────────────────────────
async function fetchEvents(classificationName) {
  const snap = await loadSnapshot();
  if (snap && Array.isArray(snap[classificationName])) {
    showSnapshotAge();
    return snap[classificationName];
  }
  return fetchEventsLive(classificationName);
}

async function fetchEventsLive(classificationName) {
  const url = new URL('https://app.ticketmaster.com/discovery/v2/events.json');
  url.searchParams.set('apikey', CONFIG.ticketmasterApiKey);
  url.searchParams.set('city', 'Philadelphia');
  url.searchParams.set('classificationName', classificationName);
  url.searchParams.set('countryCode', 'US');
  url.searchParams.set('size', '80');
  url.searchParams.set('sort', 'date,asc');
  url.searchParams.set('startDateTime', new Date().toISOString().split('.')[0] + 'Z');

  const res = await fetch(url);
  if (!res.ok) throw new Error(`Ticketmaster error ${res.status}`);
  const data = await res.json();
  const events = (data._embedded && data._embedded.events) || [];
  const isSports = classificationName === 'sports';

  return events.map(e => {
    const venue = (e._embedded?.venues || [])[0] || {};
    const attraction = (e._embedded?.attractions || [])[0];
    const performerName = attraction?.name || e.name;
    const imgs = attraction?.images || e.images || [];
    const bestImg =
      imgs.filter(i => i.ratio === '16_9' && i.width >= 640).sort((a,b) => b.width - a.width)[0]
      || imgs.sort((a,b) => (b.width||0) - (a.width||0))[0];
    const datetime = e.dates?.start?.dateTime
      || (e.dates?.start?.localDate
          ? `${e.dates.start.localDate}T${e.dates.start.localTime || '20:00:00'}`
          : null);
    const pr = e.priceRanges || [];
    const lowest  = pr.length ? Math.min(...pr.map(p => p.min).filter(n => n != null)) : null;
    const highest = pr.length ? Math.max(...pr.map(p => p.max).filter(n => n != null)) : null;
    const cls = (e.classifications || [])[0] || {};
    const genre = cls.genre?.name || 'Other';
    const subGenre = cls.subGenre?.name || '';

    return {
      id: e.id,
      url: e.url,
      type: isSports ? 'sports' : 'music',
      genre,
      subGenre,
      league: isSports ? (subGenre || genre) : null,
      datetime_local: datetime,
      venue: { name: venue.name || 'Venue TBA' },
      stats: {
        lowest_price:  Number.isFinite(lowest)  ? Math.round(lowest)  : null,
        highest_price: Number.isFinite(highest) ? Math.round(highest) : null,
      },
      performers: [{
        name: isSports ? (e.name || performerName) : performerName,
        short_name: performerName,
        image: bestImg?.url || null,
      }],
    };
  });
}

async function fetchConcerts() { return fetchEvents('music'); }

// ── RENDER CONCERTS ───────────────────────────────────
function isUpcoming(ev) {
  if (!ev.datetime_local) return true;
  return new Date(ev.datetime_local).getTime() > Date.now();
}

function sortedEvents() {
  let events = allEvents.filter(isUpcoming);
  if (currentGenre !== 'all') {
    events = events.filter(e => e.genre === currentGenre);
  }
  if (currentSort === 'price') {
    events.sort((a, b) => (a.stats.lowest_price || 9999) - (b.stats.lowest_price || 9999));
  } else if (currentSort === 'saved') {
    events.sort((a, b) => {
      const aS = isArtistSaved(a.performers[0].name) ? 0 : 1;
      const bS = isArtistSaved(b.performers[0].name) ? 0 : 1;
      return aS - bS;
    });
  }
  return events;
}

function filteredSports() {
  const upcoming = allSportsEvents.filter(isUpcoming);
  if (currentLeague === 'all') return upcoming;
  return upcoming.filter(e => e.league === currentLeague);
}

function buildFilterChips(containerId, values, dataAttr, current) {
  const container = document.getElementById(containerId);
  const label = container.querySelector('.filter-label')?.outerHTML || '';
  const chips = [
    `<button class="filter-btn ${current==='all'?'active':''}" data-${dataAttr}="all">All</button>`,
    ...values.map(v =>
      `<button class="filter-btn ${current===v?'active':''}" data-${dataAttr}="${v.replace(/"/g,'&quot;')}">${v}</button>`
    ),
  ].join('');
  container.innerHTML = label + chips;
}

function formatPrice(stats) {
  const lo = stats?.lowest_price, hi = stats?.highest_price;
  if (lo && hi && hi > lo) return `$${lo}–$${hi}`;
  if (lo) return `$${lo}+`;
  if (hi) return `up to $${hi}`;
  return null;
}

function formatDate(dtStr) {
  const d = new Date(dtStr);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function formatTime(dtStr) {
  const d = new Date(dtStr);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function renderConcerts() {
  const grid = document.getElementById('concert-grid');
  const events = sortedEvents();
  document.getElementById('show-count').textContent = events.length;

  if (!events.length) {
    grid.innerHTML = '<div class="loading">No upcoming shows found.</div>';
    return;
  }

  grid.innerHTML = events.map((event, i) => {
    const artist = event.performers[0];
    const priceStr = formatPrice(event.stats);
    const price = priceStr || 'See prices ↗';
    const saved = isArtistSaved(artist.name);
    const imgStyle = artist.image ? `background-image: url('${artist.image}')` : '';
    const delay = Math.min(i * 0.04, 0.5);

    return `
      <div class="concert-card" style="animation-delay:${delay}s" data-id="${event.id}">
        <div class="card-img" style="${imgStyle}">
          <div class="card-img-overlay"></div>
          ${!artist.image ? `<div class="card-img-fallback">${(artist.short_name || artist.name || '?')[0]}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-artist" title="${artist.name}">${artist.name}</div>
          <div class="card-venue" title="${event.venue.name}">${event.venue.name}</div>
          <div class="card-meta">
            <span>${formatDate(event.datetime_local)} · ${formatTime(event.datetime_local)}</span>
            <span class="card-price">${price}</span>
          </div>
          <div class="card-actions">
            <button class="btn-listen" onclick="openDrawer('${event.id}')">▶ Listen</button>
            <button class="btn-save ${saved ? 'saved' : ''}" id="save-btn-${event.id}" onclick="toggleSave('${event.id}')">
              ${saved ? '✓ Saved' : '+ Save'}
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ── TOGGLE SAVE (from card) ───────────────────────────
function findEvent(eventId) {
  return allEvents.find(e => e.id === eventId) || allSportsEvents.find(e => e.id === eventId);
}

function toggleSave(eventId) {
  const event = findEvent(eventId);
  if (!event) return;
  const artist = event.performers[0];
  const btn = document.getElementById(`save-btn-${eventId}`);

  if (isArtistSaved(artist.name)) {
    unsaveArtist(artist.name);
    btn.textContent = '+ Save';
    btn.classList.remove('saved');
  } else {
    saveArtist(event, 7, false);
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');
  }
}

// ── DRAWER ────────────────────────────────────────────
function openDrawer(eventId) {
  const event = findEvent(eventId);
  if (!event) return;
  const isSports = event.type === 'sports';
  const artist = event.performers[0];
  const saved = isArtistSaved(artist.name);
  const savedData = getSaved()[artist.name];
  selectedReminderDays = savedData?.reminderDays || 7;

  const priceStr = formatPrice(event.stats);
  const price = priceStr || 'Check Ticketmaster';

  const scQuery = encodeURIComponent(artist.name);

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-eyebrow">Artist</div>
    <div class="drawer-artist-name">${artist.name}</div>
    <div class="drawer-meta">
      <span>${event.venue.name}</span>
      <span>${formatDate(event.datetime_local)} at ${formatTime(event.datetime_local)}</span>
      <span>${priceStr ? `Tickets from <strong style="color:var(--accent)">${priceStr}</strong> — ` : ''}<a href="${event.url}" target="_blank">View on Ticketmaster ↗</a></span>
    </div>

    ${isSports ? '' : `
      <div class="drawer-section-label">Listen</div>
      <div class="listen-links">
        <a class="yt" href="https://www.youtube.com/results?search_query=${scQuery}" target="_blank">YouTube ↗</a>
        <a class="sc" href="https://soundcloud.com/search?q=${scQuery}" target="_blank">SoundCloud ↗</a>
        <a class="sp" href="https://open.spotify.com/search/${scQuery}" target="_blank">Spotify ↗</a>
      </div>
    `}

    <hr class="divider" />

    <div class="drawer-section-label">Save to Outlook Calendar</div>
    <div style="margin-bottom:0.75rem;">
      <div style="font-size:0.7rem;color:var(--muted);margin-bottom:0.5rem;">Remind me before the show:</div>
      <div class="reminder-toggles">
        <button class="reminder-btn ${selectedReminderDays===7?'active':''}" data-days="7" onclick="setReminder(7)">1 week</button>
        <button class="reminder-btn ${selectedReminderDays===14?'active':''}" data-days="14" onclick="setReminder(14)">2 weeks</button>
        <button class="reminder-btn ${selectedReminderDays===30?'active':''}" data-days="30" onclick="setReminder(30)">1 month</button>
      </div>
    </div>

    <button
      class="btn-add-cal ${savedData?.calendarSynced ? 'synced' : ''}"
      id="btn-add-cal"
      onclick="handleSaveToCalendar('${event.id}')">
      ${savedData?.calendarSynced ? '✓ Added to Outlook' : '+ Add to Outlook Calendar'}
    </button>

    <a class="btn-tickets-link" href="${event.url}" target="_blank">
      Buy Tickets on Ticketmaster ↗
    </a>
  `;

  // Show overlay + drawer
  const overlay = document.getElementById('drawer-overlay');
  const drawer = document.getElementById('artist-drawer');
  overlay.classList.remove('hidden');
  requestAnimationFrame(() => {
    overlay.classList.add('visible');
    drawer.classList.add('open');
  });
}

function closeDrawer() {
  const overlay = document.getElementById('drawer-overlay');
  const drawer = document.getElementById('artist-drawer');
  overlay.classList.remove('visible');
  drawer.classList.remove('open');
  setTimeout(() => overlay.classList.add('hidden'), 300);
}

function setReminder(days) {
  selectedReminderDays = days;
  document.querySelectorAll('.reminder-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.days) === days);
  });
}

// ── MSAL / OUTLOOK ────────────────────────────────────
let msalInstance = null;

let msalReady = null;

function initMsal() {
  if (!CONFIG.msalClientId || CONFIG.msalClientId === 'YOUR_AZURE_APP_CLIENT_ID') return;
  try {
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: CONFIG.msalClientId,
        authority: `https://login.microsoftonline.com/${CONFIG.msalTenantId}`,
        redirectUri: window.location.href.split('?')[0].split('#')[0],
      },
      cache: { cacheLocation: 'localStorage' },
    });

    msalReady = msalInstance.initialize().then(async () => {
      await msalInstance.handleRedirectPromise();
      const account = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0];
      if (account) {
        msalInstance.setActiveAccount(account);
        setOutlookConnected(true);
      }
    }).catch(e => console.warn('MSAL init failed:', e.message));
  } catch (e) {
    console.warn('MSAL init failed:', e.message);
  }
}

function setOutlookConnected(val) {
  outlookConnected = val;
  const btn = document.getElementById('btn-outlook');
  if (val) {
    btn.textContent = '✓ Outlook Connected';
    btn.classList.add('connected');
  } else {
    btn.textContent = 'Connect Outlook';
    btn.classList.remove('connected');
  }
}

async function connectOutlook() {
  if (!msalInstance) {
    alert('Set your Azure app client ID in CONFIG.msalClientId to enable Outlook integration.\n\nSee setup instructions at the bottom of this file.');
    return;
  }
  try {
    if (msalReady) await msalReady;
    const result = await msalInstance.loginPopup({ scopes: ['Calendars.ReadWrite'] });
    msalInstance.setActiveAccount(result.account);
    setOutlookConnected(true);
  } catch (e) {
    if (e.errorCode !== 'user_cancelled') {
      alert('Outlook sign-in failed: ' + e.message);
    }
  }
}

async function getGraphToken() {
  if (msalReady) await msalReady;
  const account = msalInstance?.getActiveAccount();
  if (!account) throw new Error('Not signed in to Outlook');
  const result = await msalInstance.acquireTokenSilent({ scopes: ['Calendars.ReadWrite'], account });
  return result.accessToken;
}

async function addToOutlookCalendar(event, reminderDays) {
  const token = await getGraphToken();
  const artist = event.performers[0];
  const showDate = new Date(event.datetime_local);
  const endDate = new Date(showDate.getTime() + 3 * 60 * 60 * 1000);

  const body = {
    subject: `🎵 ${artist.name} @ ${event.venue.name}`,
    body: {
      contentType: 'HTML',
      content: `<p><strong>${artist.name}</strong> live at ${event.venue.name}, Philadelphia</p><p><a href="${event.url}">View on Ticketmaster</a></p>`
    },
    start: { dateTime: showDate.toISOString(), timeZone: 'America/New_York' },
    end:   { dateTime: endDate.toISOString(),  timeZone: 'America/New_York' },
    reminderMinutesBeforeStart: reminderDays * 24 * 60,
    isReminderOn: true,
    location: { displayName: `${event.venue.name}, Philadelphia, PA` },
  };

  const res = await fetch('https://graph.microsoft.com/v1.0/me/events', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Graph API error');
  }
  return res.json();
}

// ── SAVE TO CALENDAR (from drawer) ───────────────────
async function handleSaveToCalendar(eventId) {
  const event = allEvents.find(e => e.id === eventId);
  if (!event) return;

  if (!outlookConnected) {
    alert('Connect your Outlook account first using the button in the header.');
    return;
  }

  const btn = document.getElementById('btn-add-cal');
  btn.textContent = 'Adding…';
  btn.disabled = true;

  try {
    await addToOutlookCalendar(event, selectedReminderDays);
    saveArtist(event, selectedReminderDays, true);

    btn.textContent = '✓ Added to Outlook';
    btn.classList.add('synced');
    btn.disabled = false;

    // Update card save btn
    const cardBtn = document.getElementById(`save-btn-${eventId}`);
    if (cardBtn) { cardBtn.textContent = '✓ Saved'; cardBtn.classList.add('saved'); }

  } catch (e) {
    btn.textContent = '+ Add to Outlook Calendar';
    btn.disabled = false;
    alert('Error adding to calendar: ' + e.message);
  }
}

// ── SAVED TAB ─────────────────────────────────────────
function renderSaved() {
  const container = document.getElementById('saved-list-container');
  const saved = getSaved();
  const items = Object.values(saved).sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

  if (!items.length) {
    container.innerHTML = '<div class="saved-empty">No saved artists yet — hit + Save on any show.</div>';
    return;
  }

  container.innerHTML = `<div class="saved-list">${items.map(item => {
    const date = new Date(item.datetime);
    const dateStr = formatDate(item.datetime);
    const daysUntil = Math.ceil((date - new Date()) / 86400000);
    const urgencyClass = daysUntil <= 7 ? 'urgent' : daysUntil <= 21 ? 'soon' : '';
    const daysLabel = daysUntil > 0 ? `${daysUntil}d away` : 'passed';

    return `
      <div class="saved-row">
        <div class="saved-left">
          <div class="saved-name">${item.artistName}</div>
          <div class="saved-venue">${item.venueName} · ${dateStr}</div>
        </div>
        <div class="saved-right">
          <span class="badge ${urgencyClass}">${daysLabel}</span>
          <span class="badge">⏰ ${item.reminderDays}d</span>
          <span class="badge ${item.calendarSynced ? 'synced' : ''}">
            ${item.calendarSynced ? '✓ Cal' : '○ Cal'}
          </span>
          <a class="saved-ticket-link" href="${item.seatgeekUrl}" target="_blank">Tickets ↗</a>
          <button class="btn-unsave" onclick="removeSaved('${item.artistName.replace(/'/g, "\\'")}')">✕</button>
        </div>
      </div>
    `;
  }).join('')}</div>`;
}

function removeSaved(name) {
  unsaveArtist(name);
  renderSaved();
  // Refresh card buttons if on feed tab
  allEvents.forEach(e => {
    if (e.performers[0].name === name) {
      const btn = document.getElementById(`save-btn-${e.id}`);
      if (btn) { btn.textContent = '+ Save'; btn.classList.remove('saved'); }
    }
  });
}

// ── LOAD CONCERTS ─────────────────────────────────────
async function loadConcerts() {
  const grid = document.getElementById('concert-grid');
  grid.innerHTML = '<div class="loading">Loading Philadelphia shows…</div>';
  try {
    allEvents = await fetchEvents('music');
    const genres = [...new Set(allEvents.map(e => e.genre).filter(g => g && g !== 'Undefined'))]
      .sort((a,b) =>
        allEvents.filter(e => e.genre === b).length -
        allEvents.filter(e => e.genre === a).length
      )
      .slice(0, 10);
    buildFilterChips('concert-genre-filters', genres, 'genre', currentGenre);
    renderConcerts();
  } catch (e) {
    grid.innerHTML = `
      <div class="loading" style="color:var(--accent2)">
        Could not load shows.<br>
        <span style="font-size:0.7rem;color:var(--muted);display:block;margin-top:0.5rem">
          Make sure CONFIG.ticketmasterApiKey is set correctly.<br>
          Error: ${e.message}
        </span>
      </div>`;
    document.getElementById('show-count').textContent = '0';
  }
}

// ── LOAD SPORTS ───────────────────────────────────────
async function loadSports() {
  const grid = document.getElementById('sports-grid');
  grid.innerHTML = '<div class="loading">Loading Philadelphia sports…</div>';
  try {
    allSportsEvents = await fetchEvents('sports');
    sportsLoaded = true;
    const leagues = [...new Set(allSportsEvents.map(e => e.league).filter(Boolean))]
      .sort((a,b) =>
        allSportsEvents.filter(e => e.league === b).length -
        allSportsEvents.filter(e => e.league === a).length
      )
      .slice(0, 10);
    buildFilterChips('sports-league-filters', leagues, 'league', currentLeague);
    renderSports();
  } catch (e) {
    grid.innerHTML = `
      <div class="loading" style="color:var(--accent2)">
        Could not load sports.<br>
        <span style="font-size:0.7rem;color:var(--muted);display:block;margin-top:0.5rem">
          Error: ${e.message}
        </span>
      </div>`;
  }
}

function renderSports() {
  const grid = document.getElementById('sports-grid');
  const events = filteredSports();

  if (!events.length) {
    grid.innerHTML = '<div class="loading">No upcoming games found.</div>';
    return;
  }

  grid.innerHTML = events.map((event, i) => {
    const title = event.performers[0].name;
    const priceStr = formatPrice(event.stats);
    const price = priceStr || 'See prices ↗';
    const saved = isArtistSaved(title);
    const img = event.performers[0].image;
    const imgStyle = img ? `background-image: url('${img}')` : '';
    const delay = Math.min(i * 0.04, 0.5);

    return `
      <div class="concert-card" style="animation-delay:${delay}s" data-id="${event.id}">
        <div class="card-img" style="${imgStyle}">
          <div class="card-img-overlay"></div>
          ${!img ? `<div class="card-img-fallback">${(title || '?')[0]}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-artist" title="${title}">${title}</div>
          <div class="card-venue" title="${event.venue.name}">${event.venue.name}</div>
          <div class="card-meta">
            <span>${formatDate(event.datetime_local)} · ${formatTime(event.datetime_local)}</span>
            <span class="card-price">${price}</span>
          </div>
          <div class="card-actions">
            <button class="btn-listen" onclick="openDrawer('${event.id}')">Details</button>
            <button class="btn-save ${saved ? 'saved' : ''}" id="save-btn-${event.id}" onclick="toggleSave('${event.id}')">
              ${saved ? '✓ Saved' : '+ Save'}
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── CALENDAR ──────────────────────────────────────────
let calendarMonth = new Date();
calendarMonth.setDate(1);
let selectedCalDate = null;

function allCombinedEvents() {
  return [...allEvents, ...allSportsEvents].filter(e => e.datetime_local && isUpcoming(e));
}

function eventsByDay() {
  const map = {};
  for (const ev of allCombinedEvents()) {
    const d = new Date(ev.datetime_local);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    (map[key] = map[key] || []).push(ev);
  }
  return map;
}

function renderCalendar() {
  const title = calendarMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  document.getElementById('cal-title').textContent = title;

  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  const byDay = eventsByDay();
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

  const keyOf = (y, m, d) => {
    const dt = new Date(y, m, d);
    return `${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
  };
  const cells = [];
  for (let i = 0; i < startOffset; i++) {
    const day = daysInPrevMonth - startOffset + 1 + i;
    cells.push({ day, otherMonth: true, key: keyOf(year, month - 1, day) });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, otherMonth: false, key: keyOf(year, month, d) });
  }
  let nextD = 1;
  while (cells.length % 7 !== 0) {
    cells.push({ day: nextD, otherMonth: true, key: keyOf(year, month + 1, nextD) });
    nextD++;
  }

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = cells.map(c => {
    const evs = byDay[c.key] || [];
    const classes = ['cal-day'];
    if (c.otherMonth) classes.push('other-month');
    if (evs.length)   classes.push('has-events');
    if (c.key === todayKey) classes.push('today');
    if (c.key === selectedCalDate) classes.push('selected');

    const visible = evs.slice(0, 3).map(e =>
      `<div class="cal-evt ${e.type === 'sports' ? 'sports' : ''}" title="${escapeAttr(e.performers[0].name)}">${escapeHtml(e.performers[0].name)}</div>`
    ).join('');
    const dots = evs.slice(0, 6).map(e =>
      `<span class="cal-evt-dot ${e.type === 'sports' ? 'sports' : ''}"></span>`
    ).join('');
    const more = evs.length > 3 ? `<div class="cal-evt-more">+${evs.length - 3} more</div>` : '';

    return `
      <div class="${classes.join(' ')}" data-day="${c.key}">
        <div class="cal-day-num">${c.day}</div>
        <div class="cal-day-events">${visible}${more}<span class="cal-evt-dots">${dots}</span></div>
      </div>`;
  }).join('');
}

function renderCalDayDetail(dayKey) {
  const detail = document.getElementById('cal-day-detail');
  const evs = (eventsByDay()[dayKey] || []).sort((a,b) =>
    new Date(a.datetime_local) - new Date(b.datetime_local)
  );
  if (!evs.length) { detail.classList.add('hidden'); return; }

  const [y, m, d] = dayKey.split('-').map(Number);
  const heading = new Date(y, m, d).toLocaleDateString('en-US',
    { weekday: 'long', month: 'long', day: 'numeric' });

  detail.innerHTML = `
    <h3>${heading}</h3>
    ${evs.map(e => `
      <div class="cal-day-item" onclick="openDrawer('${e.id}')">
        <div>
          <span class="cal-day-item-tag ${e.type === 'sports' ? 'sports' : ''}">${e.type}</span>
          <span class="cal-day-item-title">${escapeHtml(e.performers[0].name)}</span>
        </div>
        <div class="cal-day-item-meta">${formatTime(e.datetime_local)} · ${escapeHtml(e.venue.name)}</div>
      </div>
    `).join('')}
  `;
  detail.classList.remove('hidden');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

async function ensureCalendarData() {
  const needs = [];
  if (!allEvents.length)       needs.push(fetchEvents('music').then(r => { allEvents = r; }));
  if (!sportsLoaded)           needs.push(fetchEvents('sports').then(r => { allSportsEvents = r; sportsLoaded = true; }));
  if (needs.length) await Promise.all(needs);
}

// ── EVENT LISTENERS ───────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', loadConcerts);
document.getElementById('btn-outlook').addEventListener('click', connectOutlook);
document.getElementById('btn-close-drawer').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.classList.remove('active');
      p.classList.add('hidden');
    });
    tab.classList.add('active');
    const panel = document.getElementById(`tab-${tab.dataset.tab}`);
    panel.classList.add('active');
    panel.classList.remove('hidden');
    if (tab.dataset.tab === 'saved') renderSaved();
    if (tab.dataset.tab === 'sports' && !sportsLoaded) loadSports();
    if (tab.dataset.tab === 'calendar') {
      ensureCalendarData().then(renderCalendar);
    }
  });
});

document.getElementById('cal-prev').addEventListener('click', () => {
  calendarMonth.setMonth(calendarMonth.getMonth() - 1);
  selectedCalDate = null;
  document.getElementById('cal-day-detail').classList.add('hidden');
  renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calendarMonth.setMonth(calendarMonth.getMonth() + 1);
  selectedCalDate = null;
  document.getElementById('cal-day-detail').classList.add('hidden');
  renderCalendar();
});
document.getElementById('cal-grid').addEventListener('click', (ev) => {
  const cell = ev.target.closest('.cal-day.has-events');
  if (!cell) return;
  selectedCalDate = cell.dataset.day;
  renderCalendar();
  renderCalDayDetail(selectedCalDate);
});

document.addEventListener('click', (ev) => {
  const btn = ev.target.closest('.filter-btn');
  if (!btn) return;
  const row = btn.closest('.filters');
  if (!row) return;
  row.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const kind = row.dataset.filterKind;
  if (kind === 'sort')   { currentSort   = btn.dataset.sort;   renderConcerts(); }
  if (kind === 'genre')  { currentGenre  = btn.dataset.genre;  renderConcerts(); }
  if (kind === 'league') { currentLeague = btn.dataset.league; renderSports();   }
});

// ── INIT ──────────────────────────────────────────────
if (location.protocol === 'file:') {
  document.documentElement.classList.add('is-file');
}
initMsal();
loadConcerts();
</script>
